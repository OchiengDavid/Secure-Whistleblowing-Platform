<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Login — Secure Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0e1a;
            color: #e8edf5;
            font-family: monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .box {
            background: #111827;
            border: 1px solid #1e2d45;
            border-radius: 8px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        h1 { font-size: 1rem; color: #00d4ff; margin-bottom: 0.3rem; }
        p { color: #6b7a99; font-size: 0.8rem; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase;
                letter-spacing: 0.1em; color: #6b7a99; margin: 1rem 0 0.3rem; }
        input[type=text], input[type=password] {
            width: 100%; background: #0a0e1a; border: 1px solid #1e2d45;
            border-radius: 4px; color: #e8edf5; font-family: inherit;
            font-size: 0.9rem; padding: 0.65rem 1rem; outline: none;
        }
        input:focus { border-color: #00d4ff; }
        input[type=submit], button {
            width: 100%; margin-top: 1.5rem; background: #00d4ff;
            color: #0a0e1a; border: none; border-radius: 4px;
            padding: 0.75rem; font-family: inherit; font-size: 0.85rem;
            font-weight: 700; letter-spacing: 0.1em; cursor: pointer;
        }
        input[type=submit]:hover, button:hover { background: #00b8d9; }
        .errorlist { color: #ff8a80; font-size: 0.78rem; margin-top: 0.5rem; list-style: none; }
        a { color: #6b7a99; font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🔒 SECURE / PORTAL</h1>
        <p>Officer authentication required</p>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
