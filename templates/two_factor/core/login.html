{% extends "two_factor/_base.html" %}
{% load i18n %}

{% block content %}
  <form action="" method="post">
    {% csrf_token %}
    {{ wizard.management_form }} <div class="form-fields">
      {% for field in wizard.form %}
        <div class="field-wrapper" style="margin-bottom: 15px;">
          <label>{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="errorlist" style="color: #ff8a80; font-size: 0.8rem;">
              {{ field.errors }}
            </div>
          {% endif %}
        </div>
      {% endfor %}
    </div>

    <input type="submit" value="AUTHENTICATE" />
    
    {% if wizard.steps.prev %}
      <button name="wizard_goto_step" type="submit" value="{{ wizard.steps.prev }}" 
              style="background: transparent; color: #6b7a99; border: 1px solid #1e2d45; margin-top: 10px; width: 100%;">
        BACK
      </button>
    {% endif %}
  </form>
{% endblock %}
