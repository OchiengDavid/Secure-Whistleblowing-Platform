# Example Nginx configuration for running the app behind Tor
# Replace `127.0.0.1:8000` with your Django backend port if different.

upstream secure_whistleblower_app {
    server 127.0.0.1:8000;
}

server {
    listen 127.0.0.1:80;
    server_name _;

    client_max_body_size 50M;
    proxy_buffers 16 4k;
    proxy_buffer_size 2k;

    location / {
        proxy_pass http://secure_whistleblower_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
