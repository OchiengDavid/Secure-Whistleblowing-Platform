<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Whistleblower Portal</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #007bff; /* Blue background */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 20px;
        }
        .encryption-icon {
            font-size: 100px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 40px;
        }
        .submit-button {
            background-color: white;
            color: #007bff;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            margin: 10px; /* Added margin for button spacing */
        }
        /* Style for the secondary button */
        .status-button {
            background-color: transparent;
            color: white;
            border: 2px solid white;
            padding: 13px 28px; /* Adjusted to match height including border */
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
        }
        .submit-button:hover {
            background-color: #f0f0f0;
        }
        .status-button:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="encryption-icon">🔒</div> <h1>SafeReport App</h1>
        <p>Submit anonymous reports safely. Your identity is protected.</p>
        
        <a href="{% url 'submit_report' %}" class="submit-button">Submit a Report</a>
        
        <a href="{% url 'check_status' %}" class="status-button">Check Case Status</a>
    </div>
</body>
</html>
